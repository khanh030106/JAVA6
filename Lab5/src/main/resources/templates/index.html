<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sinh viên - VueJS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<div id="app" class="container mt-5">
    <h2 class="text-primary mb-4">Quản Lý Sinh Viên (VueJS + API)</h2>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-3">
                    <label>Mã SV</label>
                    <input v-model="form.id" type="text" class="form-control" :disabled="isEdit">
                </div>
                <div class="col-md-3">
                    <label>Họ Tên</label>
                    <input v-model="form.name" type="text" class="form-control">
                </div>
                <div class="col-md-3">
                    <label>Điểm</label>
                    <input v-model="form.mark" type="number" step="0.1" class="form-control">
                </div>
                <div class="col-md-3">
                    <label>Giới tính</label>
                    <select v-model="form.gender" class="form-select">
                        <option :value="true">Nam</option>
                        <option :value="false">Nữ</option>
                    </select>
                </div>
            </div>
            <div class="mt-3">
                <button v-if="!isEdit" @click="saveStudent" class="btn btn-success me-2">Thêm Mới</button>
                <button v-if="isEdit" @click="updateStudent" class="btn btn-warning me-2">Cập Nhật</button>
                <button @click="resetForm" class="btn btn-secondary">Làm Mới</button>
            </div>
        </div>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Mã SV</th>
            <th>Họ Tên</th>
            <th>Điểm</th>
            <th>Giới Tính</th>
            <th>Hành Động</th>
        </tr>
        </thead>
        <tbody>
        <tr v-for="sv in students" :key="sv.id">
            <td>{{ sv.id }}</td>
            <td>{{ sv.name }}</td>
            <td>{{ sv.mark }}</td>
            <td>{{ sv.gender ? 'Nam' : 'Nữ' }}</td>
            <td>
                <button @click="editStudent(sv)" class="btn btn-sm btn-info me-2">Sửa</button>
                <button @click="deleteStudent(sv.id)" class="btn btn-sm btn-danger">Xóa</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    const { createApp } = Vue;
    const API_URL = "http://localhost:8080/students";

    createApp({
        data() {
            return {
                students: [], // Chứa danh sách SV từ API
                form: { id: '', name: '', mark: 0, gender: true }, // Dữ liệu form
                isEdit: false // Trạng thái: đang thêm mới hay cập nhật
            }
        },
        mounted() {
            // Chạy ngay khi load trang
            this.loadStudents();
        },
        methods: {
            // Tương ứng GET
            loadStudents() {
                axios.get(API_URL).then(response => {
                    this.students = response.data;
                }).catch(error => console.error("Lỗi tải dữ liệu", error));
            },
            // Tương ứng POST
            saveStudent() {
                axios.post(API_URL, this.form).then(response => {
                    this.loadStudents(); // Tải lại bảng
                    this.resetForm();    // Xóa trắng form
                    alert("Thêm thành công!");
                }).catch(error => console.error("Lỗi thêm", error));
            },
            // Đưa dữ liệu lên form để chuẩn bị sửa
            editStudent(student) {
                this.form = { ...student }; // Copy object để tránh lỗi bind 2 chiều
                this.isEdit = true;
            },
            // Tương ứng PUT
            updateStudent() {
                axios.put(`${API_URL}/${this.form.id}`, this.form).then(response => {
                    this.loadStudents();
                    this.resetForm();
                    alert("Cập nhật thành công!");
                }).catch(error => console.error("Lỗi cập nhật", error));
            },
            // Tương ứng DELETE
            deleteStudent(id) {
                if (confirm("Bạn có chắc chắn muốn xóa SV này?")) {
                    axios.delete(`${API_URL}/${id}`).then(response => {
                        this.loadStudents();
                        alert("Xóa thành công!");
                    }).catch(error => console.error("Lỗi xóa", error));
                }
            },
            resetForm() {
                this.form = { id: '', name: '', mark: 0, gender: true };
                this.isEdit = false;
            }
        }
    }).mount('#app')
</script>
</body>
</html>
