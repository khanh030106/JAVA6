<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RESTful Web API</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<h3>RESTful Web API</h3>
<hr>
<button onclick="doGetAll()">Get All</button>
<button onclick="doGetByKey()">Get By Key</button>
<button onclick="doPost()">Post</button>
<button onclick="doPut()">Put</button>
<button onclick="doDelete()">Delete</button>

<script>
  // CẬP NHẬT ĐƯỜNG DẪN FIREBASE CỦA RIÊNG BẠN Ở ĐÂY
  const host = "https://java6-lab4-b9c8e-default-rtdb.firebaseio.com";

  function doGetAll() {
    var url = `${host}/.json`;
    axios.get(url).then(resp => {
      console.log("Success", resp.data);
    }).catch(error => {
      console.log("Error", error);
    });
  }

  function doGetByKey() {
    // Thay <<key>> bằng key sinh ra từ Firebase (VD: -OS8u4AsNVzv...)
    var key = "<<key>>";
    var url = `${host}/${key}.json`;
    axios.get(url).then(resp => {
      console.log("Success", resp.data);
    }).catch(error => {
      console.log("Error", error);
    });
  }

  function doPost() {
    var url = `${host}/.json`;
    var data = {
      "id": "SV99",
      "name": "Sinh viên 99",
      "mark": 4.5,
      "gender": true
    };
    axios.post(url, data).then(resp => {
      console.log("Success", resp.data);
    }).catch(error => {
      console.log("Error", error);
    });
  }

  function doPut() {
    // Thay <<key>> bằng key sinh ra từ Firebase để cập nhật đúng mục
    var key = "<<key>>";
    var url = `${host}/${key}.json`;
    var data = {
      "id": "SV00",
      "name": "Sinh viên 00 (Đã sửa)",
      "mark": 8.5,
      "gender": true
    };
    axios.put(url, data).then(resp => {
      console.log("Success", resp.data);
    }).catch(error => {
      console.log("Error", error);
    });
  }

  function doDelete() {
    // Thay <<key>> bằng key cần xóa
    var key = "<<key>>";
    var url = `${host}/${key}.json`;
    axios.delete(url).then(resp => {
      console.log("Success null", resp.data);
    }).catch(error => {
      console.log("Error", error);
    });
  }
</script>
</body>
</html>
